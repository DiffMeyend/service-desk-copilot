    pack_ids: [onedrive_sync]
  - issue_type: "Microsoft 365"
    sub_issue_type: "Office Activation"
    pack_ids: [m365_office_activation]
  - issue_type: "Microsoft 365"
    sub_issue_type: "Conditional Access"
    pack_ids: [m365_conditional_access]
  - issue_type: "Microsoft 365"
    sub_issue_type: "MFA"
    pack_ids: [m365_mfa_method]
  - issue_type: "Microsoft 365"
    sub_issue_type: "Licensing"
    pack_ids: [m365_office_activation]
  - issue_type: "Microsoft 365"
    sub_issue_type: "SharePoint"
    pack_ids: [file_share_permissions, onedrive_sync]
  - issue_type: "Microsoft 365"
    sub_issue_type: "WAM / MSAL"
    pack_ids: [m365_wam_msal]
  - issue_type: "Microsoft 365"
