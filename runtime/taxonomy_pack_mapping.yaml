# taxonomy_pack_mapping.yaml
# Maps Autotask Issue Type + Sub-Issue Type pairs to branch pack IDs.
# Used by branch_pack_selector.py for taxonomy-first routing.
#
# Selection: When a ticket has Issue Type + Sub-Issue Type, look up here first.
# If no match, fall back to keyword matching against the branch packs catalog.

version: "1.3.1"

# Issue Type aliases — normalize PSA variants to canonical names
issue_type_aliases:
  "Workstation Issue": "Workstation"
  "Workstation Problem": "Workstation"
  "Microsoft Issue": "Microsoft 365"
  "Microsoft 365 Issue": "Microsoft 365"
  "M365": "Microsoft 365"
  "Email Issue": "Email"
  "Email Problem": "Email"
  "Network Issue": "Network"
  "Network Problem": "Network"
  "Server Issue": "Server"
  "Server Problem": "Server"
  "Software Issue": "Workstation"
  "Printer Issue": "Printer/Scanner"
  "Print Issue": "Printer/Scanner"
  "Phone Issue": "Phone System"
  "Phone Problem": "Phone System"
  "Power Issue": "Power"
  "File Share Issue": "File Share"
  "User Issue": "User"
  "User Account": "User"
  "Backup Issue": "Backup and Restore"

mappings:

  # ── Backup and Restore ──────────────────────────────────────
  - issue_type: "Backup and Restore"
    sub_issue_type: "Backup Failure"
    pack_ids: [backup_failure]
  - issue_type: "Backup and Restore"
    sub_issue_type: "File/Folder Restore"
    pack_ids: [backup_file_restore]
  - issue_type: "Backup and Restore"
    sub_issue_type: "Workstation Recovery"
    pack_ids: [backup_workstation_recovery]
  - issue_type: "Backup and Restore"
    sub_issue_type: "Server Recovery"
    pack_ids: [backup_workstation_recovery]
  - issue_type: "Backup and Restore"
    sub_issue_type: "Backup Configuration"
    pack_ids: [backup_failure]

  # ── Workstation ─────────────────────────────────────────────
  - issue_type: "Workstation"
    sub_issue_type: "Slow Performance"
    pack_ids: [disk_io_pressure]
  - issue_type: "Workstation"
    sub_issue_type: "Blue Screen / BSOD"
    pack_ids: [disk_io_pressure, endpoint_macos]
  - issue_type: "Workstation"
    sub_issue_type: "Cannot Boot"
    pack_ids: [disk_io_pressure]
  - issue_type: "Workstation"
    sub_issue_type: "Software Installation"
    pack_ids: [endpoint_privilege_elevation, app_unmanaged]
  - issue_type: "Workstation"
    sub_issue_type: "Software Not Working"
    pack_ids: [app_unmanaged, app_lob]
  - issue_type: "Workstation"
    sub_issue_type: "Driver Issue"
    pack_ids: [only_this_device]
  - issue_type: "Workstation"
    sub_issue_type: "Profile Issue"
    pack_ids: [windows_profile_corruption]
  - issue_type: "Workstation"
    sub_issue_type: "Hardware Issue"
    pack_ids: [only_this_device]
  - issue_type: "Workstation"
    sub_issue_type: "Application Crash"
    pack_ids: [app_unmanaged, app_lob]
  - issue_type: "Workstation"
    sub_issue_type: "OS Update Issue"
    pack_ids: [gpo_intune_drift]
  - issue_type: "Workstation"
    sub_issue_type: "Peripheral Issue"
    pack_ids: [only_this_device]
  - issue_type: "Workstation"
    sub_issue_type: "Mac Issue"
    pack_ids: [endpoint_macos]
  - issue_type: "Workstation"
    sub_issue_type: "Adobe Reader"
    pack_ids: [app_adobe_reader]
  - issue_type: "Workstation"
    sub_issue_type: "Adobe Pro"
    pack_ids: [app_adobe_pro]
  - issue_type: "Workstation"
    sub_issue_type: "QuickBooks"
    pack_ids: [app_quickbooks]
  - issue_type: "Workstation"
    sub_issue_type: "Browser Issue"
    pack_ids: [app_browser]
  - issue_type: "Workstation"
    sub_issue_type: "Password Manager"
    pack_ids: [app_password_manager]
  - issue_type: "Workstation"
    sub_issue_type: "How To / Training"
    pack_ids: [howto_guidance]

  # ── Email ───────────────────────────────────────────────────
  - issue_type: "Email"
    sub_issue_type: "Cannot Send/Receive"
    pack_ids: [exchange_autodiscover]
  - issue_type: "Email"
    sub_issue_type: "Outlook Not Working"
    pack_ids: [exchange_autodiscover, m365_wam_msal]
  - issue_type: "Email"
    sub_issue_type: "Shared Mailbox"
    pack_ids: [shared_mailbox_permissions]
  - issue_type: "Email"
    sub_issue_type: "Spam / Junk"
    pack_ids: [email_security, inky_email_security]
  - issue_type: "Email"
    sub_issue_type: "Phishing Report"
    pack_ids: [email_security, inky_email_security]
  - issue_type: "Email"
    sub_issue_type: "Quarantine"
    pack_ids: [email_security, inky_email_security]
  - issue_type: "Email"
    sub_issue_type: "Distribution List"
    pack_ids: [shared_mailbox_permissions]
  - issue_type: "Email"
    sub_issue_type: "Email Encryption"
    pack_ids: [inky_email_security]
  - issue_type: "Email"
    sub_issue_type: "Calendar Issue"
    pack_ids: [exchange_autodiscover]
  - issue_type: "Email"
    sub_issue_type: "Mobile Email"
    pack_ids: [email_mobile]
  - issue_type: "Email"
    sub_issue_type: "Google Workspace"
    pack_ids: [email_gsuite]
  - issue_type: "Email"
    sub_issue_type: "Apple Mail"
    pack_ids: [email_apple]
  - issue_type: "Email"
    sub_issue_type: "Third Party Email"
    pack_ids: [email_third_party]

  # ── Printer/Scanner ─────────────────────────────────────────
  - issue_type: "Printer/Scanner"
    sub_issue_type: "Cannot Print"
    pack_ids: [print_subsystem]
  - issue_type: "Printer/Scanner"
    sub_issue_type: "Print Quality"
    pack_ids: [print_subsystem]
  - issue_type: "Printer/Scanner"
    sub_issue_type: "Scanner Issue"
    pack_ids: [print_subsystem]
  - issue_type: "Printer/Scanner"
    sub_issue_type: "Driver Issue"
    pack_ids: [print_subsystem]
  - issue_type: "Printer/Scanner"
    sub_issue_type: "Network Printer"
    pack_ids: [print_subsystem]

  # ── Server ──────────────────────────────────────────────────
  - issue_type: "Server"
    sub_issue_type: "Server Down"
    pack_ids: [server_hardware]
  - issue_type: "Server"
    sub_issue_type: "Server Slow"
    pack_ids: [disk_io_pressure, server_hardware]
  - issue_type: "Server"
    sub_issue_type: "Active Directory"
    pack_ids: [ad_auth_dc]
  - issue_type: "Server"
    sub_issue_type: "DNS / DHCP"
    pack_ids: [dns_proxy_tls, dhcp_ip_conflict]
  - issue_type: "Server"
    sub_issue_type: "Group Policy"
    pack_ids: [gpo_intune_drift]
  - issue_type: "Server"
    sub_issue_type: "Virtualization"
    pack_ids: [server_virtualization]
  - issue_type: "Server"
    sub_issue_type: "WVD / AVD"
    pack_ids: [server_wvd]
  - issue_type: "Server"
    sub_issue_type: "Hardware Issue"
    pack_ids: [server_hardware]
  - issue_type: "Server"
    sub_issue_type: "Certificate Issue"
    pack_ids: [dns_proxy_tls]

  # ── Network ─────────────────────────────────────────────────
  - issue_type: "Network"
    sub_issue_type: "Internet Down"
    pack_ids: [wan_isp_degradation]
  - issue_type: "Network"
    sub_issue_type: "Slow Internet"
    pack_ids: [wan_isp_degradation, wifi]
  - issue_type: "Network"
    sub_issue_type: "VPN Issue"
    pack_ids: [vpn_client]
  - issue_type: "Network"
    sub_issue_type: "Wi-Fi Issue"
    pack_ids: [wifi]
  - issue_type: "Network"
    sub_issue_type: "DNS Issue"
    pack_ids: [dns_proxy_tls]
  - issue_type: "Network"
    sub_issue_type: "DHCP Issue"
    pack_ids: [dhcp_ip_conflict]
  - issue_type: "Network"
    sub_issue_type: "Firewall Issue"
    pack_ids: [firewall_acl]
  - issue_type: "Network"
    sub_issue_type: "Switch / AP Issue"
    pack_ids: [wifi, wan_isp_degradation]
  - issue_type: "Network"
    sub_issue_type: "Network Drive"
    pack_ids: [file_share_permissions]

  # ── Power ───────────────────────────────────────────────────
  - issue_type: "Power"
    sub_issue_type: "Power Outage"
    pack_ids: [power_outage]
  - issue_type: "Power"
    sub_issue_type: "UPS Issue"
    pack_ids: [power_ups]

  # ── Phone System ────────────────────────────────────────────
  - issue_type: "Phone System"
    sub_issue_type: "Call Quality"
    pack_ids: [phone_call_quality]
  - issue_type: "Phone System"
    sub_issue_type: "Voicemail"
    pack_ids: [phone_voicemail]
  - issue_type: "Phone System"
    sub_issue_type: "How To"
    pack_ids: [phone_howto]
  - issue_type: "Phone System"
    sub_issue_type: "Phone Changes"
    pack_ids: [phone_changes]
  - issue_type: "Phone System"
    sub_issue_type: "Hardware Issue"
    pack_ids: [phone_hardware]
  - issue_type: "Phone System"
    sub_issue_type: "Phone Outage"
    pack_ids: [phone_outage]

  # ── File Share ──────────────────────────────────────────────
  - issue_type: "File Share"
    sub_issue_type: "Access Denied"
    pack_ids: [file_share_permissions]
  - issue_type: "File Share"
    sub_issue_type: "DFS Issue"
    pack_ids: [file_share_permissions]
  - issue_type: "File Share"
    sub_issue_type: "Mapping Issue"
    pack_ids: [file_share_permissions, gpo_intune_drift]
  - issue_type: "File Share"
    sub_issue_type: "Sync Issue"
    pack_ids: [onedrive_sync]

  # ── User ────────────────────────────────────────────────────
  - issue_type: "User"
    sub_issue_type: "Password Reset"
    pack_ids: [ad_auth_dc, m365_mfa_method]
  - issue_type: "User"
    sub_issue_type: "Account Lockout"
    pack_ids: [ad_auth_dc]
  - issue_type: "User"
    sub_issue_type: "MFA Issue"
    pack_ids: [m365_mfa_method]
  - issue_type: "User"
    sub_issue_type: "New User Setup"
    pack_ids: [howto_guidance]
  - issue_type: "User"
    sub_issue_type: "Offboarding"
    pack_ids: [howto_guidance]
  - issue_type: "User"
    sub_issue_type: "Permissions Change"
    pack_ids: [file_share_permissions, shared_mailbox_permissions]

  # ── Microsoft 365 ───────────────────────────────────────────
  - issue_type: "Microsoft 365"
    sub_issue_type: "Teams Issue"
    pack_ids: [m365_teams]
  - issue_type: "Microsoft 365"
