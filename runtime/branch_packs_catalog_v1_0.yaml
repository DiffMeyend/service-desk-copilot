description: 'Consolidated QF CNTXT_Wiz branch packs for GPT knowledge uploads. Each pack
  keeps the original hypothesis text but now exposes metadata (category, keywords,
  command references) so RouterBrain can pick the right pack deterministically.

'
categories:
  network: Connectivity, routing, WAN, VPN, DHCP, WLAN, DNS, proxy/TLS.
  identity: Authentication, Conditional Access, MFA, Entra ID, domain joins.
  m365: Microsoft 365 app/service-specific troubleshooting.
  messaging: Exchange Online, Outlook, Shared Mailboxes, email transport.
  security: ThreatLocker, Defender/EDR, policy-driven blocks.
  endpoint: Single-device issues, OS health, disk/profile corruption.
  infrastructure: Servers, file shares, print services, DFS, policy drift.
  cross_cutting: Use when scoping (recent change, only-this-user/device).
schema_notes:
  pack_fields:
  - 'id: unique slug (used by CP.branches.source_pack).'
  - 'name: human readable title.'
  - 'category: must be one of the keys under categories.'
  - 'keywords: list of phrases to match against ticket summary/notes.'
  - 'signals: optional list of specific errors/events/vendors.'
  - 'goal: short description copied from original pack.'
  - 'notes: optional nuance/escalation reminders.'
  - 'hypotheses: list of objects with keys id, hypothesis, confidence_hint, discriminating_question,
    discriminating_tests[], command_refs[], notes.'
selection_rules:
- On PASTE_TICKET ingest, scan summary + body for keyword matches (case-insensitive).
- 'If multiple packs match, load up to two: the most specific (exact phrase) then
  a fallback cross-cutting pack.'
- Store the chosen pack IDs in CP.branches.source_pack (array) for audit.
- If no keywords match, fall back to manual hypothesis creation.
- Packs flagged category=network should not be mixed with unrelated packs unless symptoms
  span tiers (e.g., VPN + DNS).
