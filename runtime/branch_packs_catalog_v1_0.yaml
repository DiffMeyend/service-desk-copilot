packs:
- id: ad_auth_dc
  name: Domain Controller / AD Auth Branch Pack
  category: identity
  keywords:
  - domain controller
  - dc unreachable
  - netlogon
  - secure channel
  - lsass
  - trust relationship
  signals:
  - Event 5719 / Netlogon
  - STATUS_TRUSTED_DOMAIN_FAILURE
  - Computer account secure channel
  goal: Collapse DC reachability vs secure channel vs account lockout.
  notes: Secure channel repair/reset is change-making (>Tier A) and usually escalated.
  preconditions:
    basic_verification_completed: true # Inline comment: ensures guardrail baseline data is logged before applying this pack.
  hypotheses:
  - id: ad_auth_dc.dc_outage
    hypothesis: DC unreachable / site issue
    confidence_hint: 0.4
    discriminating_question: Domain logon slow/fails; file shares unavailable
    discriminating_tests:
    - 'Run Tier-A: domain_dc_check (nltest /dsgetdc).'
    - Check network baseline (net_snapshot).
    command_refs:
    - domain_dc_check
    - net_snapshot
  - id: ad_auth_dc.secure_channel
    hypothesis: Secure channel / computer account issues
    confidence_hint: 0.35
    discriminating_question: Only one machine has domain trust issues
    discriminating_tests:
    - Look for Netlogon/LSA errors in system_errors.
    - 'Escalate: repair secure channel is change-making (STOP) and often exceeds QF.'
    command_refs:
    - system_errors
    notes: Repair requires admin action beyond Tier-A; gate with STOP.
  - id: ad_auth_dc.account_lockout
    hypothesis: Account lockout / password issues
    confidence_hint: 0.25
    discriminating_question: User canâ€™t log in across devices
    discriminating_tests:
    - Check lockout status if tools available or ping OHT.
    - Capture exact login error text.
- id: defender_edr
  name: Defender/EDR Interference Branch Pack
  category: security
  keywords:
  - defender
  - edr
  - antivirus
  - threatlocker
  - quarantine
  - malware
  signals:
  - EDR alert/quarantine notice
  - ThreatLocker block toast
  - Missing binaries immediately after detection
  goal: Collapse true infection vs false positive/quarantine vs policy block.
  notes: Default to read-only evidence; change-making remediation requires STOP +
    security approval.
  preconditions:
    basic_verification_completed: true # Inline comment: ensures baseline troubleshooting finished before attributing issues to security tooling.
  hypotheses:
  - id: defender_edr.policy_block
    hypothesis: EDR/AV blocked or quarantined component
    confidence_hint: 0.45
    discriminating_question: Do you see missing files, blocked executions, or EDR
      alerts tied to the timeframe?
    discriminating_tests:
    - Check EDR console (read-only) for detections/quarantines.
    - Collect exact error messages + affected file/process names.
    - Correlate with Application/System errors and WER.
    command_refs:
    - threatlocker_recent_events
    - threatlocker_agent_status
    - app_errors
    - system_errors
  - id: defender_edr.malware
    hypothesis: Actual malware/infection suspected
    confidence_hint: 0.35
    discriminating_question: Are there multiple suspicious symptoms (unknown processes,
      persistence, widespread issues)?
    discriminating_tests:
    - Escalate immediately to security process (skill).
    - 'Preserve evidence: timestamps, screenshots, alerts.'
    - Do not run change-making remediation without security approval.
  - id: defender_edr.not_edr
    hypothesis: Not EDR; app/system issue
    confidence_hint: 0.2
    discriminating_question: No alerts/quarantines and behavior matches known app
      failure patterns
    discriminating_tests:
    - Route to app-specific pack (Outlook/OneDrive/Print/etc.).
    - Record EDR ruled out (tests_run + results).
- id: dhcp_ip_conflict
  name: DHCP/IP Conflict Branch Pack
  category: network
  keywords:
