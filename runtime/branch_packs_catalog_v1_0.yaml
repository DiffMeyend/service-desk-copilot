  hypotheses:
  - id: dhcp_ip_conflict.bad_lease
    hypothesis: Bad DHCP lease / wrong gateway/DNS
    confidence_hint: 0.4
    discriminating_question: Does the device have an APIPA address, wrong subnet,
      or wrong DNS?
    discriminating_tests:
    - 'Run Tier-A: net_snapshot and adapters.'
    - Compare gateway/DNS to expected for that site/VLAN.
    - If renew/release is needed, that is change-making (STOP).
    command_refs:
    - net_snapshot
    - adapters
  - id: dhcp_ip_conflict.duplicate_ip
    hypothesis: Duplicate IP conflict
    confidence_hint: 0.35
    discriminating_question: Intermittent connectivity, ARP flapping, or â€˜IP address
      conflictâ€™ messages?
    discriminating_tests:
    - Check event logs for TCPIP warnings (system_errors).
    - Escalate if switch/DHCP investigation required (skill/time).
  - id: dhcp_ip_conflict.vlan_mismatch
    hypothesis: VLAN/port mispatch
    confidence_hint: 0.25
    discriminating_question: Device moved or switch port changed; now on wrong VLAN?
    discriminating_tests:
    - Confirm physical move/recent changes.
    - Compare IP/subnet to expected for location.
    - Escalate to network team if switch config needed (skill).
