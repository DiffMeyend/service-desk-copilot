- id: inky_email_security
  name: Inky Email Security FAQ Branch Pack
  category: messaging
  keywords:
  - inky
  - inky warning
  - warning banner
  - graymail
  - greymail
  - not graymail
  - quarantine digest
  - microsoft 365 security: you have messages in quarantine
  - security.microsoft.com/quarantine
  - [encrypt]
  - encryption portal
  - safe sender
  - not spam
  signals:
  - Inky banner (red/yellow/blue/gray)
  - Microsoft 365 quarantine digest email
  goal: Route INKY-related tickets to user education vs safe release vs escalation.
  notes: Inky uses Microsoft 365 quarantine; digest email is legitimate. Red banners should be escalated.
  hypotheses:
  - id: inky_email_security.legit_quarantine_digest
    hypothesis: Legitimate Microsoft 365 quarantine digest triggered by Inky signals
    confidence_hint: 0.45
    discriminating_question: 'Is the user receiving "Microsoft 365 security: You have messages in quarantine" emails?'
    discriminating_tests:
    - Confirm sender is `quarantine@messaging.microsoft.com`.
    - Point user to `https://security.microsoft.com/quarantine`.
    - Explain this is expected behavior with Inky + M365.
  - id: inky_email_security.false_positive
    hypothesis: Safe email flagged/graymailed by Inky
    confidence_hint: 0.35
    discriminating_question: Is the user expecting the sender and subject?
    discriminating_tests:
    - Have user use "Not Graymail" or "Not Spam" in banner if appropriate.
    - Add sender to Safe Sender list if needed.
    - If uncertain, forward to support for review.
  - id: inky_email_security.high_risk_banner
    hypothesis: High-risk phishing detected by Inky
    confidence_hint: 0.2
    discriminating_question: Does the banner show Red / Suspicious?
    discriminating_tests:
    - Instruct user not to click links/attachments.
    - Forward to support for verification.
    - Treat as potential phishing incident if user already clicked.
  - id: inky_email_security.encryption_howto
    hypothesis: User asking how to send encrypted email with Inky
    confidence_hint: 0.2
    discriminating_question: Is the request about "[ENCRYPT]" or the encryption portal?
    discriminating_tests:
    - Confirm `[ENCRYPT]` plus a space before subject text.
    - Explain recipients authenticate via Microsoft/Google/Magic link.

